<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="Côté Montagne — Saint-Lary">
  <defs>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#E9D28F"/>
      <stop offset=".5"   stop-color="#C9A961"/>
      <stop offset="1"    stop-color="#8C6B2E"/>
    </linearGradient>
  </defs>

  <!-- Mountain "M" silhouette -->
  <g fill="#0A0A0A">
    <path d="M180 370
             L260 70
             L330 70
             L370 250
             L430 70
             L500 70
             L560 370
             L490 370
             L455 190
             L405 370
             L345 370
             L300 200
             L260 370 Z"/>
  </g>

  <!-- Gold Art Déco hairline framing the M -->
  <path d="M180 385 H560" stroke="url(#goldStroke)" stroke-width="1.5" fill="none"/>
  <path d="M210 400 H530" stroke="url(#goldStroke)" stroke-width="0.8" fill="none"/>

  <!-- Script wordmark — "Côté" top-left -->
  <text x="60" y="170"
        font-family="'Fraunces', Georgia, serif"
        font-style="italic"
        font-weight="600"
        font-size="110"
        fill="#0A0A0A"
        transform="rotate(-6 90 170)">Côté</text>

  <!-- "Montagne" bottom band -->
  <text x="120" y="420"
        font-family="'Fraunces', Georgia, serif"
        font-style="italic"
        font-weight="600"
        font-size="92"
        fill="#0A0A0A">Montagne</text>

  <!-- "St Lary" top-right -->
  <text x="560" y="230"
        font-family="'Fraunces', Georgia, serif"
        font-style="italic"
        font-weight="500"
        font-size="58"
        fill="#0A0A0A"
        transform="rotate(-4 590 230)">St Lary</text>
</svg>
